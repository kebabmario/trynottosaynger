<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Try Not To Say Nger</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: url('assets/bg.jpg') center center / cover no-repeat fixed;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .container {
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 40px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
    }

    h1 {
      color: #fff;
      font-size: 2rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(255, 80, 80, 0.7);
    }

    p.hint {
      color: rgba(255, 255, 255, 0.65);
      font-size: 0.95rem;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    #user-input {
      flex: 1;
      padding: 14px 20px;
      border-radius: 10px;
      border: 2px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 1.1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #user-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    #user-input:focus {
      border-color: rgba(255, 255, 255, 0.6);
    }

    #submit-btn {
      padding: 14px 24px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #ff4e4e, #c0392b);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    #submit-btn:hover {
      opacity: 0.85;
    }

    #submit-btn:active {
      transform: scale(0.96);
    }

    /* ── Game-over overlay ────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #overlay.show {
      display: flex;
      animation: fadeIn 0.35s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    #game-over-text {
      font-size: clamp(2rem, 6vw, 5rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 4px;
      text-align: center;
      line-height: 1.25;
      color: transparent;
      background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #8b00ff, #ff0000);
      background-size: 300% auto;
      -webkit-background-clip: text;
      background-clip: text;
      animation: rainbow 1.5s linear infinite, popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      text-shadow: none;
      padding: 0 24px;
    }

    @keyframes rainbow {
      0%   { background-position: 0% center; }
      100% { background-position: 300% center; }
    }

    @keyframes popIn {
      0%   { transform: scale(0.3) rotate(-6deg); opacity: 0; }
      60%  { transform: scale(1.1) rotate(2deg);  opacity: 1; }
      100% { transform: scale(1)   rotate(0deg);  opacity: 1; }
    }

    #play-again {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 32px;
      border-radius: 10px;
      border: 2px solid #fff;
      background: transparent;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: none;
      transition: background 0.2s;
      z-index: 101;
    }

    #play-again:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    #play-again.show {
      display: block;
      animation: fadeIn 0.4s 0.6s ease both;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Try Not To Say Nger</h1>
    <p class="hint">Type anything… just don't say <em>that word</em>. Press Enter to submit.</p>
    <div class="input-row">
      <input
        id="user-input"
        type="text"
        placeholder="Say something innocent…"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="submit-btn">Enter</button>
    </div>
  </div>

  <!-- Game-over overlay -->
  <div id="overlay">
    <div id="game-over-text">the feds coming brodi gg</div>
  </div>
  <button id="play-again">Play Again</button>

  <script>
    const input     = document.getElementById('user-input');
    const submitBtn = document.getElementById('submit-btn');
    const overlay   = document.getElementById('overlay');
    const playAgain = document.getElementById('play-again');

    const FORBIDDEN = /\bnigga\b|\bnigger\b/i;

    function checkInput() {
      if (FORBIDDEN.test(input.value)) {
        triggerGameOver();
      }
    }

    function triggerGameOver() {
      overlay.classList.add('show');
      playAgain.classList.add('show');
      input.disabled = true;
      submitBtn.disabled = true;
    }

    function resetGame() {
      overlay.classList.remove('show');
      playAgain.classList.remove('show');
      input.disabled = false;
      submitBtn.disabled = false;
      input.value = '';
      input.focus();
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') checkInput();
    });

    submitBtn.addEventListener('click', checkInput);
    playAgain.addEventListener('click', resetGame);
  </script>
</body>
</html>
